<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Vehicular Ixil</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --red-ixil:#b91c1c; --yellow-ixil:#facc15; }
.bg-red-ixil{background:var(--red-ixil);}
input,select,textarea{font-size:16px!important;color:black!important;}
input[type="date"]{min-height:45px;background:white!important;}
</style>
</head>

<body class="bg-stone-100">

<!-- LOGIN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded shadow">
<input id="login_user" placeholder="Usuario" class="border p-2 w-full mb-2">
<input id="login_pass" placeholder="PIN" type="password" class="border p-2 w-full mb-2">
<button id="btn-login" class="bg-red-700 text-white w-full p-2">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden p-4">

<button id="salir" class="bg-white border px-4 py-2 mb-4">SALIR</button>

<!-- PDF -->
<div class="flex gap-2 mb-4">
<button onclick="pdfTodo()" class="bg-red-600 text-white px-3 py-2 rounded">PDF TODO</button>
<button onclick="pdfRango()" class="bg-yellow-400 px-3 py-2 rounded">PDF POR FECHA</button>
</div>

<input type="date" id="f1">
<input type="date" id="f2">

<!-- FORM -->
<div class="mt-4">
<select id="s_vehiculo"></select>
<select id="s_tipo" onchange="toggleS()">
<option value="Gasolina">Gasolina</option>
<option value="Otro">Otro</option>
</select>

<input id="s_litros" placeholder="Litros">
<textarea id="s_detalle"></textarea>

<label>Fecha</label>
<input type="date" id="s_fecha">

<select id="s_responsable"></select>

<button id="add-s">Guardar</button>
</div>

<table class="w-full mt-4">
<tbody id="list-servicios"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({
apiKey:"AIza...",
databaseURL:"https://ixil-vehicular-default-rtdb.firebaseio.com"
});
const db=getDatabase(app);

let datos=[];

// LOGIN
btn-login.onclick=()=>{
if(login_user.value=="ayuntamiento"&&login_pass.value=="2427"){
login-screen.style.display="none";
app-screen.style.display="block";
sync();
}else alert("Error");
};

// SALIR
salir.onclick=()=>{
if(confirm("¿Salir?")) location.reload();
};

// GUARDAR
add-s.onclick=()=>{
if(!s_vehiculo.value||!s_responsable.value||!s_fecha.value)return alert("Faltan datos");

const hora=new Date().toLocaleTimeString();

push(ref(db,"servicios"),{
u:s_vehiculo.value,
t:s_tipo.value,
d:s_tipo.value=="Gasolina"?s_litros.value+" Lts":s_detalle.value,
f:s_fecha.value,
h:hora,
r:s_responsable.value,
ts:Date.now()
}).then(()=>{
s_vehiculo.value="";
s_responsable.value="";
s_tipo.value="Gasolina";
s_litros.value="";
s_detalle.value="";
s_fecha.value="";
toggleS();
alert("Guardado");
});
};

// SYNC
function sync(){
onValue(ref(db,"servicios"),s=>{
datos=[];
list-servicios.innerHTML="";
s.forEach(c=>{
const d=c.val();
datos.push({k:c.key,...d});
list-servicios.innerHTML+=`
<tr>
<td>${d.u}</td>
<td>${d.t}</td>
<td>${d.d}</td>
<td>${d.f} ${d.h||""}</td>
<td><button onclick="elim('${c.key}')">X</button></td>
</tr>`;
});
});
}

// ELIMINAR CON NIP
window.elim=id=>{
const nip=prompt("NIP:");
if(nip==="2427"){
if(confirm("¿Eliminar?")) remove(ref(db,"servicios/"+id));
}else alert("Incorrecto");
};

// PDF TODO
window.pdfTodo=()=>{
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=10;
datos.forEach(d=>{
doc.text(`${d.u} ${d.t} ${d.d} ${d.f} ${d.h||""}`,10,y);
y+=10;
});
doc.save("reporte.pdf");
};

// PDF RANGO
window.pdfRango=()=>{
if(!f1.value||!f2.value)return alert("Fechas");
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=10;
datos.filter(d=>d.f>=f1.value&&d.f<=f2.value)
.forEach(d=>{
doc.text(`${d.u} ${d.t} ${d.d} ${d.f}`,10,y);
y+=10;
});
doc.save("reporte_fecha.pdf");
};

window.toggleS=()=>{
if(s_tipo.value=="Gasolina"){
s_litros.style.display="block";
s_detalle.style.display="none";
}else{
s_litros.style.display="none";
s_detalle.style.display="block";
}
};

</script>

</body>
</html>
