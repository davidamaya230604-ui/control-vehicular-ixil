<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Vehicular - Ayuntamiento de Ixil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --red-ixil: #b91c1c; --yellow-ixil: #facc15; }
        .bg-red-ixil { background-color: var(--red-ixil); }
        .text-red-ixil { color: var(--red-ixil); }
        .active-tab { border-bottom: 4px solid var(--yellow-ixil); color: var(--yellow-ixil) !important; }
        input, select, textarea { font-size: 16px !important; color: black !important; } 
        input[type="date"] { min-height: 45px; background-color: white !important; display: flex; align-items: center; position: relative; }
        input[type="date"]::-webkit-calendar-picker-indicator { position: absolute; left: 0; top: 0; width: 100%; height: 100%; margin: 0; padding: 0; cursor: pointer; opacity: 0; }
        .icono-fecha { position: absolute; right: 10px; top: 12px; pointer-events: none; color: #b91c1c; }
    </style>
</head>
<body class="bg-stone-100">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-red-700">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-red-700 uppercase italic">Ayuntamiento de Ixil</h1>
                <p class="text-gray-500 font-semibold text-sm">Sistema de Control 2024-2027</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login_user" placeholder="Usuario" class="w-full p-3 border rounded shadow-sm focus:ring-2 focus:ring-red-500 outline-none">
                <input type="password" id="login_pass" inputmode="numeric" placeholder="PIN de Acceso" class="w-full p-3 border rounded shadow-sm focus:ring-2 focus:ring-red-500 outline-none">
                <button id="btn-login" class="w-full bg-red-ixil text-white py-3 rounded-lg font-bold uppercase text-sm">Ingresar al Panel</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header class="bg-red-ixil text-white shadow-xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold italic tracking-tighter text-yellow-400">IXIL <span class="text-white font-light">GESTIÓN</span></h2>
                    <p class="text-[10px] font-bold uppercase text-white/70">Estado de Yucatán</p>
                </div>
                <button onclick="confirmarSalida()" class="bg-white text-red-700 px-4 py-1 rounded font-bold text-sm">SALIR</button>
            </div>
            <nav class="max-w-7xl mx-auto px-4 flex gap-6 mt-2 overflow-x-auto">
                <button id="btn-tab-r" class="py-2 px-4 font-bold active-tab text-white text-xs uppercase">Responsables</button>
                <button id="btn-tab-v" class="py-2 px-4 font-bold text-white/80 text-xs uppercase">Vehículos</button>
                <button id="btn-tab-m" class="py-2 px-4 font-bold text-white/80 text-xs uppercase">Historial</button>
            </nav>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-6">
            
            <div id="sec-responsables" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-red-700 h-fit">
                    <h3 class="text-lg font-bold text-red-700 mb-4 uppercase text-sm italic text-center">Nuevo Responsable</h3>
                    <input type="text" id="r_nombre" placeholder="Nombre Completo" class="w-full p-2 border rounded mb-2 bg-white text-black">
                    <input type="text" id="r_cargo" placeholder="Cargo" class="w-full p-2 border rounded mb-3 bg-white text-black">
                    <button id="add-r" class="w-full bg-red-ixil text-white py-2 rounded font-bold uppercase text-xs">Agregar Persona</button>
                </div>
                <div id="list-responsables" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="sec-vehiculos" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-red-700 h-fit">
                    <h3 class="text-lg font-bold text-red-700 mb-4 uppercase text-sm italic text-center">Alta de Unidad</h3>
                    <select id="v_tipo" class="w-full p-2 border rounded mb-2 bg-white text-sm">
                        <option value="Carro">🚗 Carro / Camioneta</option>
                        <option value="Moto">🏍️ Motocicleta</option>
                    </select>
                    <input type="text" id="v_modelo" placeholder="Modelo" class="w-full p-2 border rounded mb-2 bg-white">
                    <input type="text" id="v_placa" placeholder="Placa" class="w-full p-2 border rounded mb-3 uppercase bg-white">
                    <button id="add-v" class="w-full bg-red-ixil text-white py-2 rounded font-bold uppercase text-xs">Guardar Vehículo</button>
                </div>
                <div id="list-vehiculos" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="sec-mantenimientos" class="tab-content hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-500 h-fit">
                    <h3 class="text-lg font-bold text-red-700 mb-4 uppercase text-sm italic text-center">Registro de Acción</h3>
                    
                    <select id="f_tipo_registro" class="w-full p-2 border rounded bg-white mb-2 text-sm font-bold border-red-200" onchange="filtrarUnidadesRegistro()">
                        <option value="Carro">Mostrar: Carros / Camionetas 🚗</option>
                        <option value="Moto">Mostrar: Motocicletas 🏍️</option>
                    </select>

                    <select id="s_vehiculo" class="w-full p-2 border rounded bg-white mb-2 text-sm"></select>
                    
                    <select id="s_tipo" class="w-full p-2 border rounded bg-white mb-2 text-sm" onchange="toggleS()">
                        <option value="Gasolina">Carga de Gasolina</option>
                        <option value="Mantenimiento">Mantenimiento Mecánico</option>
                        <option value="Otro">Otro (Incidente, Venta, etc.)</option>
                    </select>
                    
                    <div id="box-gas" class="relative mb-2">
                        <input type="number" id="s_litros" inputmode="decimal" placeholder="Cantidad" class="w-full p-2 border rounded pr-8 bg-white text-black">
                        <span class="absolute right-3 top-2 font-bold text-gray-400">L</span>
                    </div>

                    <div id="box-otro" class="hidden mb-2">
                        <textarea id="s_detalle" placeholder="Detalles..." class="w-full p-2 border rounded bg-white text-black"></textarea>
                    </div>

                    <div class="relative mb-2">
                        <input type="date" id="s_fecha" class="w-full p-2 border rounded bg-white text-black">
                        <i class="fa-solid fa-calendar-days icono-fecha"></i>
                    </div>

                    <select id="s_responsable" class="w-full p-2 border rounded bg-white mb-3 text-sm"></select>
                    
                    <button id="add-s" class="w-full bg-yellow-500 text-red-900 py-3 rounded font-bold shadow mb-4 uppercase text-xs">Guardar Registro</button>
                    
                    <button onclick="generarReportePDF()" class="w-full bg-slate-800 text-white py-2 rounded font-bold text-[10px] shadow uppercase italic">
                        <i class="fa-solid fa-file-pdf mr-2"></i> Generar Reporte PDF
                    </button>
                </div>

                <div class="lg:col-span-2">
                    <div class="flex flex-col md:flex-row justify-between mb-4 gap-4">
                        <h3 class="font-bold text-gray-700 uppercase text-[10px] tracking-widest self-center italic">Historial de Operaciones</h3>
                        <input type="text" id="buscador-placa" onkeyup="filtrar()" placeholder="🔍 Filtrar unidad..." class="w-full md:w-64 p-2 border-2 border-red-100 rounded-full text-xs outline-none focus:border-red-500 shadow-inner bg-white text-black">
                    </div>
                    <div class="bg-white rounded-xl shadow overflow-x-auto">
                        <table class="w-full text-left text-[9px] md:text-xs">
                            <thead class="bg-red-50 border-b text-red-900 uppercase font-black">
                                <tr><th class="p-3">Fecha/Hora</th><th class="p-3">Vehículo</th><th class="p-3">Acción</th><th class="p-3">Detalle</th><th class="p-3">X</th></tr>
                            </thead>
                            <tbody id="list-servicios" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrcQkkYW3mFtrn8UqRCBm-hihlxvqRkmM",
            authDomain: "ixil-vehicular.firebaseapp.com",
            databaseURL: "https://ixil-vehicular-default-rtdb.firebaseio.com", 
            projectId: "ixil-vehicular",
            storageBucket: "ixil-vehicular.firebasestorage.app",
            messagingSenderId: "303469283462",
            appId: "1:303469283462:web:79f85d6ea5b6609a6ee907"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let listaVehiculosGlobal = [];
        let listaServiciosGlobal = [];

        // LOGIN
        document.getElementById('btn-login').onclick = () => {
            const u = document.getElementById('login_user').value.toLowerCase();
            const p = document.getElementById('login_pass').value;
            if (u === "ayuntamiento" && p === "2427") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                sync();
            } else { alert("Acceso Incorrecto."); }
        };

        window.confirmarSalida = () => {
            if(confirm("¿Abandonar la aplicación?")) location.reload();
        };

        // PESTAÑAS
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-white/80'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            const btns = {responsables: 'btn-tab-r', vehiculos: 'btn-tab-v', mantenimientos: 'btn-tab-m'};
            document.getElementById(btns[tab]).classList.add('active-tab');
        };
        document.getElementById('btn-tab-r').onclick = () => showTab('responsables');
        document.getElementById('btn-tab-v').onclick = () => showTab('vehiculos');
        document.getElementById('btn-tab-m').onclick = () => showTab('mantenimientos');

        // AGREGAR RESPONSABLE
        document.getElementById('add-r').onclick = () => {
            const n = document.getElementById('r_nombre').value;
            const c = document.getElementById('r_cargo').value;
            if(n && c) {
                push(ref(db, 'responsables'), { nombre: n, cargo: c });
                document.getElementById('r_nombre').value = ''; 
                document.getElementById('r_cargo').value = '';
            } else { alert("Completa los campos"); }
        };

        // AGREGAR VEHÍCULO
        document.getElementById('add-v').onclick = () => {
            const t = document.getElementById('v_tipo').value;
            const m = document.getElementById('v_modelo').value;
            const p = document.getElementById('v_placa').value.toUpperCase();
            if(m && p) push(ref(db, 'vehiculos'), { tipo: t, modelo: m, placa: p });
            document.getElementById('v_modelo').value = ''; document.getElementById('v_placa').value = '';
        };

        // FILTRO DE UNIDADES PARA EL SELECTOR DEL HISTORIAL
        window.filtrarUnidadesRegistro = () => {
            const tipoFiltro = document.getElementById('f_tipo_registro').value;
            const sel = document.getElementById('s_vehiculo');
            sel.innerHTML = '<option value="">Seleccionar Unidad...</option>';
            listaVehiculosGlobal.filter(v => v.tipo === tipoFiltro).forEach(v => {
                sel.innerHTML += `<option value="${v.modelo} [${v.placa}]">${v.modelo} (${v.placa})</option>`;
            });
        };

        // GUARDAR REGISTRO E HISTORIAL
        document.getElementById('add-s').onclick = () => {
            const v = document.getElementById('s_vehiculo').value;
            const r = document.getElementById('s_responsable').value;
            const f = document.getElementById('s_fecha').value;
            if(!v || !r || !f) return alert("Llena los campos obligatorios");
            
            const tipoB = document.getElementById('s_tipo').value;
            const det = tipoB === 'Gasolina' ? document.getElementById('s_litros').value + ' L' : document.getElementById('s_detalle').value;
            const h = new Date().toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'});

            push(ref(db, 'servicios'), { u: v, t: tipoB, d: det, f: f, h: h, r: r, ts: Date.now() })
            .then(() => {
                document.getElementById('s_vehiculo').value = '';
                document.getElementById('s_litros').value = '';
                document.getElementById('s_detalle').value = '';
                document.getElementById('s_fecha').value = '';
                document.getElementById('s_responsable').value = '';
                alert("Guardado");
            });
        };

        // SINCRONIZACIÓN FIREBASE
        function sync() {
            onValue(ref(db, 'responsables'), s => {
                const list = document.getElementById('list-responsables');
                const sel = document.getElementById('s_responsable');
                list.innerHTML = ""; sel.innerHTML = '<option value="">Autoriza...</option>';
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-yellow-400 flex justify-between items-center text-left"><div><p class="font-bold text-xs text-red-900">${d.nombre}</p><p class="text-[9px] uppercase text-gray-400">${d.cargo}</p></div><button onclick="elimF('responsables','${c.key}')" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button></div>`;
                    sel.innerHTML += `<option value="${d.nombre}">${d.nombre}</option>`;
                });
            });

            onValue(ref(db, 'vehiculos'), s => {
                const list = document.getElementById('list-vehiculos');
                list.innerHTML = ""; 
                listaVehiculosGlobal = [];
                s.forEach(c => {
                    const d = c.val();
                    listaVehiculosGlobal.push(d);
                    const icon = d.tipo === 'Moto' ? '🏍️' : '🚗';
                    list.innerHTML += `<div class="bg-white p-3 rounded-xl border-l-8 border-red-700 shadow-sm flex justify-between items-center text-left"><div><p class="font-black text-xs uppercase text-gray-800">${icon} ${d.modelo}</p><p class="text-[10px] text-red-700 font-mono">${d.placa}</p></div><button onclick="elimF('vehiculos','${c.key}')" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button></div>`;
                });
                filtrarUnidadesRegistro();
            });

            onValue(ref(db, 'servicios'), s => {
                const list = document.getElementById('list-servicios');
                list.innerHTML = "";
                listaServiciosGlobal = [];
                s.forEach(c => {
                    const val = c.val();
                    listaServiciosGlobal.push({k: c.key, ...val});
                });
                listaServiciosGlobal.sort((a,b) => b.ts - a.ts).forEach(d => {
                    list.innerHTML += `<tr><td class="p-3 font-bold text-gray-800 uppercase text-[8px]">${d.f}<br><span class="text-red-500 font-normal italic">${d.h || ''}</span></td><td class="p-3 uppercase text-gray-700 font-black">${d.u}</td><td class="p-3"><span class="bg-red-100 px-2 py-1 rounded text-[8px] font-black uppercase text-red-800">${d.t}</span></td><td class="p-3 text-gray-600 italic text-[9px]">${d.d}<br><small class="text-gray-400 font-normal">Por: ${d.r}</small></td><td class="p-3 text-center"><button onclick="elimF('servicios','${d.k}')" class="text-red-200"><i class="fa-solid fa-trash"></i></button></td></tr>`;
                });
            });
        }

        window.elimF = (p, k) => { 
            if(prompt("🔐 PIN PARA ELIMINAR:") === "2427") remove(ref(db, `${p}/${k}`)); 
            else alert("PIN Incorrecto");
        };
        
        window.filtrar = () => {
            const input = document.getElementById('buscador-placa').value.toUpperCase();
            const filas = document.querySelectorAll("#list-servicios tr");
            filas.forEach(f => f.style.display = f.textContent.toUpperCase().includes(input) ? "" : "none");
        };

        window.toggleS = () => {
            const t = document.getElementById('s_tipo').value;
            document.getElementById('box-gas').classList.toggle('hidden', t !== 'Gasolina');
            document.getElementById('box-otro').classList.toggle('hidden', t === 'Gasolina');
        };

        // REPORTE PDF CON FILTRO DE FECHAS
        window.generarReportePDF = () => {
            const opcion = confirm("¿Deseas filtrar por rango de fechas? (Cancelar para reporte completo)");
            let reporteData = listaServiciosGlobal;

            if (opcion) {
                const inicio = prompt("Fecha de inicio (AAAA-MM-DD):");
                const fin = prompt("Fecha de fin (AAAA-MM-DD):");
                
                if (inicio && fin) {
                    reporteData = listaServiciosGlobal.filter(s => s.f >= inicio && s.f <= fin);
                } else {
                    return alert("Rango de fechas no válido");
                }
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("AYUNTAMIENTO DE IXIL - REPORTE", 105, 20, { align: "center" });
            
            const rows = reporteData.map(d => [d.f + ' ' + (d.h || ''), d.u, d.t, d.d + ' (Resp: ' + d.r + ')']);
            
            doc.autoTable({ 
                head: [['Fecha/Hora', 'Unidad', 'Acción', 'Detalles']], 
                body: rows, 
                startY: 30, 
                styles: { fontSize: 7 } 
            });
            doc.save(`Reporte_Ixil.pdf`);
        };
    </script>
</body>
</html>
